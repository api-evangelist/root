openapi: 3.1.0
info:
  version: 1.0.1
  title: Root Applications Policyholders API
  description: Root is an end-to-end digital insurance platform that enables you to launch new products and digital engagement channels fast.
  termsOfService: https://rootplatform.com/about
  contact:
    name: Root support team
    url: https://rootplatform.com/contact
    email: support@root.co.za
servers:
- url: https://sandbox.uk.rootplatform.com/v1/insurance
  description: United Kingdom multi-tenant - sandbox
- url: https://api.uk.rootplatform.com/v1/insurance
  description: United Kingdom multi-tenant - production
- url: https://sandbox.rootplatform.com/v1/insurance
  description: South Africa multi-tenant - sandbox
- url: https://api.rootplatform.com/v1/insurance
  description: South Africa multi-tenant - production
security:
- basicAuth: []
tags:
- name: Policyholders
paths:
  /policyholders:
    post:
      operationId: create-policyholder
      summary: Create a policyholder
      tags:
      - Policyholders
      x-additional-tags:
      - Create
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/policyholder-request'
            examples:
              individual:
                summary: Individual policyholder
                value:
                  type: individual
                  id:
                    type: id
                    number: '6801015800084'
                    country: ZA
                  initials: E
                  first_name: Erlich
                  middle_name: Aviato
                  last_name: Bachman
                  email: erlich@avaito.com
                  cellphone: '+27821234567'
                  phone_other: '+27124101337'
                  app_data:
                    company: Aviato
                  address:
                    line_1: 5230 Penfield Avenue
                    suburb: Woodland Hills
                    city: Los Angeles
                    country: US
                    area_code: '91364'
              company:
                summary: Company policyholder
                value:
                  type: company
                  first_name: Allister
                  last_name: Smith
                  email: allister@testco.com
                  company_name: Test Co
                  registration_number: 12398734A
                  date_of_establishment: '19880202'
                  company_website_url: www.testco.co.za
                  contact_position: Engineer
                  subsidiary_companies:
                  - Subsidiary Inc
                  cellphone: '+27821234567'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/policyholder'
    get:
      operationId: fetch-policyholders
      summary: List all policyholders
      tags:
      - Policyholders
      x-additional-tags:
      - Retrieve
      parameters:
      - name: id_number
        in: query
        description: An optional ID or passport number to filter by.
        required: false
        schema:
          type: string
      - name: include
        in: query
        description: An optional semicolon-separated list of underlying objects to include, e.g. `?include=policies`. Currently, only `policies` is supported, which will include all policies owned by the policyholder.
        required: false
        schema:
          type: string
      - $ref: '#/components/parameters/page_size'
      - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/policyholders'
              example:
              - policyholder_id: bf1ada91-eecb-4f47-9bfa-1258bb1e0055
                type: individual
                initials: E
                first_name: Erlich
                last_name: Bachman
                id:
                  type: id
                  number: '6801015800084'
                  country: ZA
                date_of_birth: '19680101'
                email: erlich@aviato.com
                cellphone: null
                phone_other: null
                created_at: '2017-10-12T15:47:34.281Z'
                app_data:
                  company: Aviato
                created_by:
                  id: 00000000-0000-0000-0000-000000000001
                  type: user
                address:
                  line_1: 5230 Penfield Avenue
                  suburb: Woodland Hills
                  city: Los Angeles
                  country: US
                  area_code: '91364'
    put:
      operationId: upsert-policyholder
      summary: Upsert a policyholder
      tags:
      - Policyholders
      x-additional-tags:
      - Create
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/policyholder-request'
            examples:
              individual:
                summary: Individual policyholder
                value:
                  type: individual
                  id:
                    type: id
                    number: '6801015800084'
                    country: ZA
                  initials: E
                  first_name: Erlich
                  middle_name: Aviato
                  last_name: Bachman
                  email: erlich@avaito.com
                  cellphone: '+27821234567'
                  phone_other: '+27124101337'
                  app_data:
                    company: Aviato
                  address:
                    line_1: 5230 Penfield Avenue
                    suburb: Woodland Hills
                    city: Los Angeles
                    country: US
                    area_code: '91364'
              company:
                summary: Company policyholder
                value:
                  type: company
                  first_name: Allister
                  last_name: Smith
                  email: allister@testco.com
                  company_name: Test Co
                  registration_number: 12398734A
                  date_of_establishment: '19880202'
                  company_website_url: www.testco.co.za
                  contact_position: Engineer
                  subsidiary_companies:
                  - Subsidiary Inc
                  cellphone: '+27821234567'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/policyholder'
  /policyholders/{policyholder_id}:
    get:
      operationId: retrieve-policyholder
      summary: Retrieve a policyholder
      tags:
      - Policyholders
      x-additional-tags:
      - Retrieve
      parameters:
      - name: policyholder_id
        in: path
        description: Must be a UUID. The unique identifier of the [policyholder](ref:policyholder).
        required: true
        schema:
          type: string
          example: bf1ada91-eecb-4f47-9bfa-1258bb1e0055
      - name: include
        in: query
        description: An optional semicolon-separated list of underlying objects to include, e.g. `?include=policies`. Currently, only `policies` is supported, which will include all policies owned by the policyholder.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/policyholder'
              example:
                policyholder_id: bf1ada91-eecb-4f47-9bfa-1258bb1e0055
                type: individual
                initials: E
                first_name: Erlich
                last_name: Bachman
                id:
                  type: id
                  number: '6801015800084'
                  country: ZA
                date_of_birth: '19680101'
                email: erlich@aviato.com
                cellphone: null
                phone_other: null
                created_at: '2017-10-12T15:47:34.281Z'
                app_data:
                  company: Aviato
                created_by:
                  id: 00000000-0000-0000-0000-000000000001
                  type: user
                address:
                  line_1: 5230 Penfield Avenue
                  suburb: Woodland Hills
                  city: Los Angeles
                  country: US
                  area_code: '91364'
    patch:
      operationId: update-policyholder
      summary: Update a policyholder
      tags:
      - Policyholders
      x-additional-tags:
      - Manage
      parameters:
      - name: policyholder_id
        in: path
        description: Must be a UUID. The unique identifier of the [policyholder](ref:policyholder).
        required: true
        schema:
          type: string
          example: bf1ada91-eecb-4f47-9bfa-1258bb1e0055
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: object
                  description: (Individual policyholders only) Object containing policyholder's identification information.
                  properties:
                    type:
                      type: string
                      description: The id type of the policyholder.
                      enum:
                      - id
                      - passport
                      - email
                      - cellphone
                      - custom
                    number:
                      type: string
                      description: Depending on the `type` selected, either an ID number, passport number, email address, cellphone number or custom identifier.
                    country:
                      type: string
                      description: The [ISO Alpha-2](http://www.nationsonline.org/oneworld/country_code_list.htm) country code of the `number`.
                    expiration_date:
                      type: string
                      format: date-time
                      description: (Individual policyholders only) The expiration date of the policyholder's passport or custom identifier.
                  required:
                  - type
                  - number
                  - country
                initials:
                  type: string
                  description: The new initials for the policyholder. This replaces the policyholder's current initials.
                title:
                  type: string
                  description: The policyholders's title.
                  enum:
                  - mr
                  - mrs
                  - miss
                  - mx
                  - sir
                  - dr
                  - adv
                  - ms
                  - prof
                first_name:
                  type: string
                  description: A new first name for the policyholder. This replaces the policyholder's current first name.
                middle_name:
                  type: string
                  description: The policyholder or primary contact's legal middle name.
                last_name:
                  type: string
                  description: A new last name for the policyholder. This replaces the policyholder's current last name.
                expiration_date:
                  type: string
                  format: date-time
                  description: (Individual policyholders only) The expiration date of the policyholder's passport or custom identifier.
                email:
                  type: string
                  description: A new contact email for the policyholder. This replaces the policyholder's current email address.
                cellphone:
                  oneOf:
                  - $ref: '#/components/schemas/cellphone'
                  - $ref: '#/components/schemas/cellphone-string'
                phone_other:
                  oneOf:
                  - $ref: '#/components/schemas/cellphone'
                  - $ref: '#/components/schemas/cellphone-string'
                app_data:
                  type:
                  - object
                  - 'null'
                  description: '`null` is allowed. An object containing additional custom data for the policy holder.'
                  additionalProperties: true
                address:
                  type:
                  - object
                  - 'null'
                  description: '`null` is allowed. The policyholder''s physical address. See below for more details.'
                  properties:
                    line_1:
                      type: string
                      description: First line of the policyholder's address.
                    line_2:
                      type:
                      - string
                      - 'null'
                      description: '`null` is allowed. Optional second line of the policyholder''s address.'
                    suburb:
                      type: string
                      description: The policyholder's suburb.
                    city:
                      type: string
                      description: The policyholder's city.
                    country:
                      type: string
                      description: The policyholder's country code, in the [ISO Alpha-2](http://www.nationsonline.org/oneworld/country_code_list.htm) format.
                    area_code:
                      type: string
                      description: The policyholder's area code, must be 4 characters long when the policyholder's country code is ZA.
                  required:
                  - line_1
                  - suburb
                  - city
                  - country
                  - area_code
            example:
              id:
                type: id
                number: '6801015800084'
                country: GB
              cellphone: '+27821234567'
              phone_other: '+27124101337'
              email: erlich@piedpiper.com
              app_data:
                company: Pied Piper
              address:
                line_1: 5230 Penfield Avenue
                suburb: Woodland Hills
                city: Los Angeles
                country: US
                area_code: CA 91364
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/policyholder'
              example:
                policyholder_id: bf1ada91-eecb-4f47-9bfa-1258bb1e0055
                type: individual
                initials: E
                first_name: Erlich
                last_name: Bachman
                id:
                  type: id
                  number: '6801015800084'
                  country: GB
                date_of_birth: '19680101'
                email: erlich@piedpiper.com
                cellphone: '+27821234567'
                phone_other: '+27124101337'
                created_at: '2017-10-12T15:47:34.281Z'
                app_data:
                  company: Pied Piper
                created_by:
                  id: 00000000-0000-0000-0000-000000000001
                  type: user
                address:
                  line_1: 5230 Penfield Avenue
                  suburb: Woodland Hills
                  city: Los Angeles
                  country: US
                  area_code: CA 91364
  /policyholders/{policyholder_id}/applications:
    get:
      operationId: fetch-policyholders-applications
      summary: List policyholder's applications
      tags:
      - Policyholders
      x-additional-tags:
      - Retrieve
      parameters:
      - name: policyholder_id
        in: path
        description: Must be a UUID. The unique identifier of the [policyholder](ref:policyholder).
        required: true
        schema:
          type: string
          example: bf1ada91-eecb-4f47-9bfa-1258bb1e0055
      - $ref: '#/components/parameters/page_size'
      - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/applications'
              example:
              - application_id: 59a10cb0-8f7a-4c7b-8deb-a863474891dd
                policyholder_id: bf1ada91-eecb-4f47-9bfa-1258bb1e0055
                package_name: Theft + comprehensive
                sum_assured: 1199900
                monthly_premium: 50000
                base_premium: 14999
                module:
                  type: root_gadgets
                  make: Apple
                  model: iPhone 6S 64GB LTE
                  serial_number: '1234567890'
                created_at: '2017-10-05T18:40:47.281Z'
                created_by:
                  id: 00000000-0000-0000-0000-000000000001
                  type: user
                currency: ZAR
                product_module_definition_id: 3c8112fc-5bf4-4d2c-ba25-361a76149ed2
                billing_frequency: monthly
                billing_month: null
                billing_day: 1
                status: active
                type: null
                beneficiaries:
                - beneficiary_id: 15c0cba9-c579-45cc-bb9c-5cde4c79350c
                  policyholder_id: bd72f916-6952-444c-9b33-3e29db5cbe8b
                  percentage: 100
                  relationship: policyholder
                quote_package_id: 338b0dc9-6a78-4baa-bf73-239690e3e201
                input_data: {}
  /policyholders/{policyholder_id}/attachments:
    get:
      operationId: retrieve-policyholder-attachments
      summary: List attachments
      tags:
      - Policyholders
      x-additional-tags:
      - Attachments & notes
      parameters:
      - name: policyholder_id
        in: path
        description: Must be a UUID. The unique identifier of the [policyholder](ref:policyholder).
        required: true
        schema:
          type: string
          example: bf1ada91-eecb-4f47-9bfa-1258bb1e0055
      - $ref: '#/components/parameters/page_size'
      - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    file_name:
                      type: string
                    file_type:
                      type: string
                    file_url:
                      type: string
                    description:
                      type: string
                    created_at:
                      type: string
                    requested_by:
                      type: object
              example:
              - file_name: report.pdf
                file_type: text/csv
                file_url: https://sandbox.root.co.za/v1/files/download/5ec09f8a-5ff9-11e8-99c9-63fa045d8a15/report.pdf
                description: Police Report
                created_at: '2018-05-25T08:55:27.600Z'
                requested_by:
                  id: 00000000-0000-0000-0000-000000000001
                  type: user
    post:
      operationId: policyholder-create-attachment
      summary: Create an attachment
      tags:
      - Policyholders
      x-additional-tags:
      - Attachments & notes
      parameters:
      - name: policyholder_id
        in: path
        description: Must be a UUID. The unique identifier of the [policyholder](ref:policyholder).
        required: true
        schema:
          type: string
          example: bf1ada91-eecb-4f47-9bfa-1258bb1e0055
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - file_name
              - description
              - file_base64
              - file_type
              properties:
                file_name:
                  type: string
                  description: The name of the file (with file extension)
                description:
                  type: string
                  description: A tag describing what the document is about (e.g. affidavit, etc.)
                file_base64:
                  type: string
                  description: The raw file bytes encoded as a base 64 string. Limited to a maximum of 4 MB in size
                file_type:
                  type: string
                  description: The mime type of the attachment (e.g. image/png)
              example:
                file_name: report.pdf
                file_type: application/pdf
                description: Police Report
                file_base64: 
            example:
              file_name: report.pdf
              file_type: application/pdf
              description: Police Report
              file_base64: 
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/attachment'
              example:
                file_name: report.pdf
                file_type: application/pdf
                file_url: http://yoururlhere/report.pdf
                description: Police Report
                type: attachment_created
                policyholder_id: 00000000-0000-0000-0000-000000000001
                created_at: '2022-01-31T11:25:23.427Z'
                requested_by:
                  type: user
                  id: 00000000-0000-0000-0000-000000000001
  /policyholders/{policyholder_id}/notes:
    get:
      operationId: fetch-policyholder-notes
      summary: List notes
      tags:
      - Policyholders
      x-additional-tags:
      - Attachments & notes
      parameters:
      - name: policyholder_id
        in: path
        description: Must be a UUID. The unique identifier of the [policyholder](ref:policyholder).
        required: true
        schema:
          type: string
          example: bf1ada91-eecb-4f47-9bfa-1258bb1e0055
      - $ref: '#/components/parameters/page_size'
      - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    text:
                      type: string
                    created_at:
                      type: object
                    requested_by:
                      type: object
              example:
              - text: Customer spoke to Erlich previously
                created_at: '2018-05-25T08:51:20.317Z'
                requested_by:
                  id: 00000000-0000-0000-0000-000000000001
                  type: user
    post:
      operationId: policyholder-add-note
      summary: Add a note
      tags:
      - Policyholders
      x-additional-tags:
      - Attachments & notes
      parameters:
      - name: policyholder_id
        in: path
        description: Must be a UUID. The unique identifier of the [policyholder](ref:policyholder).
        required: true
        schema:
          type: string
          example: bf1ada91-eecb-4f47-9bfa-1258bb1e0055
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - text
              properties:
                text:
                  type: string
                  description: A string of text for the note.
              example:
                text: Customer spoke to Erlich previously
            example:
              text: Customer spoke to Erlich previously
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/note'
              example:
                text: Customer spoke to Erlich previously
                type: text_note_created
                policyholder_id: 00000000-0000-0000-0000-000000000001
                created_at: '2022-10-16T10:12:02.872Z'
                requested_by:
                  type: user
                  id: 00000000-0000-0000-0000-000000000001
  /policyholders/{policyholder_id}/payment-methods:
    get:
      operationId: fetch-policyholder-payment-methods
      summary: List policyholder payment methods
      tags:
      - Policyholders
      x-additional-tags:
      - Payment methods
      parameters:
      - name: policyholder_id
        in: path
        description: Must be a UUID. The unique identifier of the [policyholder](ref:policyholder).
        required: true
        schema:
          type: string
          example: :policyholder_id
      - $ref: '#/components/parameters/page_size'
      - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    payment_method_id:
                      type: string
                    type:
                      type: string
                    bank_details:
                      type: object
              example:
              - payment_method_id: e0b7b222-772f-47ac-b08d-c7ba38aa1b25
                type: debit_order
                bank_details:
                  first_name: Erlich
                  last_name: Bachman
                  bank: absa
                  branch_code: '12345'
                  account_number: '123456789'
                  banv_response:
                    account_number: '0000000000000'
                    flags: N
                    id_number: '8902165145086'
                    initials: s
                    name: dube
                    reference: 58196226-b9a1-4b8d-82bb-3ea5322790e2
                    result: A/c doesn't exist
    post:
      operationId: create-policyholder-payment-method
      summary: Create payment method
      description: Create a payment method. Read more about [payment methods](doc:billing-settings#payment-method-types).
      tags:
      - Policyholders
      x-additional-tags:
      - Payment methods
      parameters:
      - name: policyholder_id
        in: path
        description: Must be a UUID. The unique identifier of the [policyholder](ref:policyholder).
        required: true
        schema:
          type: string
          example: f91f4ea4-9c6d-459e-998b-a5711cbd8895
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - type
              properties:
                type:
                  type: string
                  description: The payment method type. `debit_order`, `card`, `eft`, `collection_module`, or a custom key for external payment methods.
                payment_method_key:
                  type: string
                  description: The key of an external payment method type. Use this for external payment methods instead of `type`.
                collection_module_key:
                  type: string
                  description: The key of the collection module to use. Required if `type` is `collection_module`.
                data:
                  type: object
                  description: Custom data for collection module payment methods. Required if `type` is `collection_module`.
                  additionalProperties: true
                payment_method_config_id:
                  type: string
                  description: Must be a UUID. The unique identifier of the payment method configuration to use. Only relevant when Direct Billing Config feature is enabled.
                bank_details:
                  type: object
                  description: Required if `type` is `debit_order`. Bank details to use for the debit order.
                  properties:
                    account_holder:
                      type: string
                      description: Name of account holder.
                    account_holder_identification:
                      type:
                      - object
                      - 'null'
                      description: '`null` is allowed. An object containing identification details of the account holder. Attributes include "type" (_string_ - either ''id'' or ''passport''), "number" (_string_), "country" (_string_), and optional "expiration_date" (_datetime_).'
                    bank:
                      $ref: '#/components/schemas/bank-name'
                    branch_code:
                      type: string
                      description: Branch code for bank account.
                    account_number:
                      type: string
                      description: Bank account number.
                    account_type:
                      type: string
                      description: Bank account type - either `cheque` or `savings`.
                  required:
                  - account_holder
                  - bank
                  - branch_code
                  - account_number
                  - account_type
                card_details:
                  type: object
                  description: Required if `type` is `card`. Cards details to use for the card payment.
                  properties:
                    registration_id:
                      type: string
                      description: External reference token identifier for the card.
                    bin:
                      type: string
                      description: Card BIN number.
                    holder:
                      type: string
                      description: First & last name on the card.
                    brand:
                      type: string
                      description: The card network. "visa" "mastercard" "discover" "americanExpress"
                    expiry_year:
                      type: string
                      description: The expiration year of the card.
                    expiry_month:
                      type: string
                      description: The expiration month of the card.
                    last_4_digits:
                      type: string
                      description: The last four digits of the card number.
                    raw_status:
                      type: object
                      description: Raw request JSON object.
                  required:
                  - registration_id
                policy_ids:
                  type: array
                  items:
                    type: string
                  description: An optional list of policy ids (each must be a UUID) to which the payment method should be assigned.
                external_reference:
                  type: string
                  description: An optional external reference linked to the payment method. Relevant for `debit_order` and external payment methods.
                application_id:
                  type: string
                  description: Must be a UUID. An optional application id to which the payment method should be assigned.
                billing_day:
                  type: integer
                  description: Only specify the billing_day when providing policy_ids otherwise it will have no effect. If any of the provided policy_ids belong to once-off or group policies, specifying a billing_day will cause the request to fail. For once-off policies, collection requests are automatically initiated upon payment method assignment, not on specified billing days. Additionally, billing day updates are not allowed for group policies.
            examples:
              debit_order:
                summary: Debit order
                value:
                  type: debit_order
                  bank_details:
                    account_holder: Erlich Bachman
