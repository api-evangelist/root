    quote-package:
      type: object
      description: Quote packages are designed to be low-fidelity and fast to generate,  and are used to generate and display new quotes rapidly on a customer-facing front-end.  They expire after one week. <br/><br/> See the [issing policies](https://docs.rootplatform.com/docs/policy-issuing) guide  and the [quote hook](https://docs.rootplatform.com/docs/quote-hook) guide for more details.
      required:
      - quote_package_id
      - package_name
      - sum_assured
      - base_premium
      - suggested_premium
      - module
      - created_at
      - currency
      - billing_frequency
      - product_module_definition_id
      properties:
        quote_package_id:
          type: string
          description: Must be a UUID. Unique identifier of the quote package.
        package_name:
          type: string
          description: The package name.
        sum_assured:
          type: integer
          description: The maximum insured value in cents.
        base_premium:
          type: integer
          description: The combined risk and platform fee in cents. `monthly_premium` should be calculated from this.
        suggested_premium:
          type: integer
          description: The suggested `monthly_premium` amount in cents. This is the total premium for display to the customer.
        module:
          type: object
          description: Custom, product-specific information saved to the quote for later reference.  These parameters are set in the [quote hook](https://docs.rootplatform.com/docs/quote-hook) in the product module code.
          additionalProperties: true
        restricted_data:
          type: object
          description: Optional restricted product-specific information saved to the quote. This field is only returned when the requestee has access to restricted quote module data.
          additionalProperties: true
        input_data:
          type: object
          description: Quote input parameters as received over the [create a quote](https://docs.rootplatform.com/reference/getting-a-quote-2) endpoint.
          additionalProperties: true
        created_at:
          type: string
          format: date-time
          description: The date/time at which the quote package was created.
        currency:
          type: string
          description: The currency used for the quote package, in [ISO 4217] (https://en.wikipedia.org/wiki/ISO_4217) format.
        billing_frequency:
          type: string
          enum:
          - monthly
          - yearly
          - once_off
          description: The frequency at which the policy will be billed. See the [billing settings](https://docs.rootplatform.com/docs/billing-settings#billing-frequency) guide for more details on the billing frequency.
        product_module_definition_id:
          type: string
          description: Must be a UUID. Unique identifier of the product module definition associated with this quote package. If a policy is issued from this quote, this product module definition will be associated with the policy.
      example:
        quote_package_id: 3822b8fb-43e7-43f7-94ad-63e94e6ce1e3
        package_name: Theft + comprehensive
        sum_assured: 1199900
        base_premium: 14999
        suggested_premium: 18749
        module:
          type: root_gadgets
          make: Apple
          model: iPhone 6S 64GB LTE
        restricted_data:
          internal_commission_bps: 2500
        created_at: '2023-02-03T11:17:09.747Z'
        currency: ZAR
        billing_frequency: monthly
        product_module_definition_id: 4889a9e0-d5f9-4971-8ac2-2175a9d15477
    payment-charge-type:
      type: string
      description: Variable charges are applied as a proportion of the total payment amount. Fixed charges are applied as an absolute currency value in cents. The `balance` is the balance of the payment total after all charges have been applied.
      enum:
      - fixed
      - variable
      - balance
    attachment:
      type: object
      required:
      - file_name
      - description
      - file_type
      - file_url
      - created_at
      - requested_by
      properties:
        file_name:
          type: string
          description: The name of the file (with file extension).
        description:
          type: string
          description: A tag describing what the document is about (e.g. affidavit, etc.).
        file_type:
          type: string
          description: The mime type of the attachment (e.g. image/png).
        file_url:
          type: string
          format: uri
          description: The URL to download the attachment file.
        created_at:
          type: string
          format: date-time
          description: Time at which the attachment was created.
        requested_by:
          type: object
          description: An object indicating the user or API key that created the attachment. See [Authentication](#client-apps).
          properties:
            type:
              type: string
              description: The type of the creator (e.g., user, api_key).
            id:
              type: string
              description: The identifier of the creator.
            owner_id:
              type: string
              description: The identifier of the owner (only present for API key requests).
          required:
          - type
        type:
          type: string
          description: The event type associated with the attachment (e.g., attachment_created). This field is only present when the attachment is returned as part of an event.
      example:
        file_name: report.pdf
        file_type: application/pdf
        file_url: https://sandbox.rootplatform.com/v1/files/download/00000000-0000-0000-0000-000000000001
        description: quote
        type: attachment_created
        created_at: '2025-11-10T14:33:50.095Z'
        requested_by:
          type: api_key
          id: 00000000-0000-0000-0000-000000000001
          owner_id: 00000000-0000-0000-0000-000000000001
    application-alteration-package:
      type: object
      required:
      - alteration_package_application_id
      - organization_id
      - created_at
      - created_by
      - module
      - application_id
      - alteration_hook_key
      properties:
        alteration_package_application_id:
          type: string
          description: Must be a UUID. Unique identifier of the application alteration package.
        organization_id:
          type: string
          description: Must be a UUID. Unique identifier of the organization.
        created_at:
          type: string
          format: date-time
          description: The date/time at which the application alteration package was created.
        created_by:
          type:
          - object
          - 'null'
          description: '`null` is allowed. An object indicating the user or API key that created the application alteration package. See [Authentication](#client-apps).'
        module:
          type: object
          description: Custom module-specific fields stored against the application alteration package. See [product modules](doc:product-modules-overview) for more details.
          additionalProperties: true
        monthly_premium:
          type:
          - integer
          - 'null'
          description: Null is allowed. The monthly premium amount in cents.
        currency:
          type:
          - string
          - 'null'
          description: Null is allowed. The currency code for premium values.
        sum_assured:
          type:
          - integer
          - 'null'
          description: Null is allowed. The sum assured amount in cents.
        billing_frequency:
          type:
          - string
          - 'null'
          description: Null is allowed. The billing frequency to be applied.
        status:
          type:
          - string
          - 'null'
          description: Null is allowed. The status of the application alteration package.
        change_description:
          type:
          - string
          - 'null'
          description: Null is allowed. Description of the change being applied.
        input_data:
          type: object
          description: The input data received when creating the alteration package.
          additionalProperties: true
        application_id:
          type: string
          description: Must be a UUID. Unique identifier of the related application.
        alteration_hook_key:
          type: string
          description: The identifier of the alteration hook used to create this package.
      example:
        alteration_package_application_id: 2d200d5c-477c-4c90-b305-e8f445f4d8e5
        organization_id: 00000000-0000-0000-0000-000000000001
        created_at: '2026-01-28T09:17:05.101Z'
