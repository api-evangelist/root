          anyOf:
          - type: 'null'
          - $ref: '#/components/schemas/policy'
        charges:
          type: array
          description: Whenever a premium payment is created (including reversals), a breakdown of the payment amount is calculated according to the charges stored on the policy.
          items:
            type: object
            required:
