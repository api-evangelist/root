  /policies/{policy_id}/prevent-lapse-and-ntu:
    post:
      operationId: prevent-policy-lapse-and-NTU
      summary: Prevent or Resume Policy Lapse and NTU
      description: 'This endpoint enables users to specify a period during which the policy is safeguarded from lapsing or entering an NTU state. Alternatively, it can be used to resume the lapse and NTU processes if needed.

        When preventing lapses, the request requires the start and end dates for the period, along with the reason. For resuming lapses, only the `resume` parameter is required.

        '
      tags:
      - Policies
      x-additional-tags:
      - Manage
      parameters:
      - name: policy_id
        in: path
        description: The unique identifier of the policy. Must be a UUID.
        required: true
        schema:
          type: string
          example: 128ba0c0-3f6a-4f8b-9b40-e2066b02b59e
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
                required:
                - resume
                properties:
                  policy_id:
                    type: string
                    description: The unique identifier of the policy.
                  resume:
                    type: boolean
                    description: Indicates whether the endpoint is being used to resume lapsing (true) or prevent lapsing (false).
                    enum:
                    - true
              - type: object
                required:
                - resume
                - reason
                - start_date
                - end_date
                properties:
                  policy_id:
                    type: string
                    description: The unique identifier of the policy.
                  resume:
                    type: boolean
                    description: Indicates whether the endpoint is being used to resume lapsing (true) or prevent lapsing (false).
                    enum:
                    - false
                  reason:
                    type: string
                    description: The reason for preventing the policy from lapsing.
                  start_date:
                    type: string
                    format: date
                    description: The start date of the prevention period (in YYYY-MM-DD format).
                  end_date:
                    type: string
                    format: date
                    description: The end date of the prevention period (in YYYY-MM-DD format).
            examples:
              preventLapse:
                summary: Prevent policy lapse
                value:
                  policy_id: 128ba0c0-3f6a-4f8b-9b40-e2066b02b59e
                  resume: false
                  reason: Customer retention
                  start_date: '2025-01-01'
                  end_date: '2025-01-31'
              resumeLapse:
                summary: Resume policy lapse
                value:
                  policy_id: 128ba0c0-3f6a-4f8b-9b40-e2066b02b59e
                  resume: true
