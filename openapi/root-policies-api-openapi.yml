            bank_name: nedbank
            branch_code: '20177778'
        type: individual
      - first_name: Erlich
        last_name: Aviatio
        percentage: 10
        title: mr
        email: erlich@aviatio.com
        relationship: other
        cellphone: '+27783456578'
        payment_details:
          type: eft
          details:
            account_number: '546767819'
            account_type: cheque_account
            bank_name: investec
            branch_code: '201507'
        company_name: Pied Piper
        registration_number: CC1234
        type: company
    payment-details:
      type: object
      description: Details of the account into which the payout should be made.
      required:
      - type
      - details
      properties:
        type:
          type: string
