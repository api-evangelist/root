    payment-status:
      type: string
      enum:
      - submitted
      - pending
      - processing
      - successful
      - failed
      - cancelled
      description: The status to which to create the payment.
    payment-coupon:
      type: object
      required:
      - payment_coupon_id
      - policy_id
      - status
      - type
      - created_at
      - created_by
      properties:
        payment_coupon_id:
          type: string
          description: Must be a UUID. Object ID of the payment coupon.
        policy_id:
          type: string
          description: Must be a UUID. Object ID of the policy.
        status:
          type: string
          description: A string indicating the status of the payment coupon. Possible values include `pending`, `redeemed`, or `cancelled`.
        type:
          type: string
          enum:
          - ad_hoc
          - payment_holiday
          description: The type of the payment coupon.
        redeemable_from:
          type: string
          format: date-time
          description: The date from which the coupon can be redeemed. Required when creating `payment_holiday` coupons.
        redeemable_to:
          type: string
          format: date-time
          description: The date by which the coupon must be redeemed. Required when creating `payment_holiday` coupons.
        amount:
          type: integer
          description: The amount, in cents, that represents the value of the coupon once redeemed. Required when creating `ad_hoc` coupons.
        reason:
          type: string
          description: The reason for the payment coupon being granted.
        payment_date:
          type: string
          format: date-time
          description: The date the payment coupon was redeemed.
        billing_date:
          type: string
          format: date-time
          description: The billing date of the payment the payment coupon repalces.
        created_at:
          type: string
          format: date-time
          description: The time at which the policy was created.
        created_by:
          type:
          - object
          - 'null'
          description: An object indicating the user or API key that created the policy. See [Authentication](#client-apps).
      example:
        payment_coupon_id: 307286b9-bbaa-4096-9ccf-fcbe596ea0a8
        policy_id: 128ba0c0-3f6a-4f8b-9b40-e2066b02b59e
        status: pending
        type: payment_holiday
        redeemable_from: '2022-06-01T00:00:00.000Z'
        redeemable_to: '2022-06-30T00:00:00.000Z'
        reason: Customer retrenched
        created_at: '2020-08-04T09:14:21.451Z'
        created_by:
          type: api_key
          id: 420df14d-b09d-4d89-84a8-8e3118c9ca23
          owner_id: 00000000-0000-0000-0000-000000000001
    payment-type:
      type: string
      description: The type of the payment being created.
      enum:
      - premium
      - reversal
      - claim_payout
      - premium_refund
      - other
    premium-type:
      type: string
      description: The type of the payment being created.Required when `payment_type` is premium or reversal, optional when `payment_type` is premium_refund, forbidden otherwise.
      enum:
      - recurring
      - arrears
      - ad_hoc
      - pro_rata
      - cover_period
      - collection_request
      - manual_eft
      - premium_refund
    failure-action:
      type: string
      enum:
      - block_payment_method
      - block_retry
      - allow_retry
      description: 'The additional action to perform when processing a failed payment. `block_payment_method`: Set the payment method''s verification status to `blocked`, and do not generate a retry. `block_retry`: Do not generate a retry payment (even if enabled in the [product module settings](doc:billing-settings)). `allow_retry`: Generate a retry payment (if enabled in the [product module settings](doc:billing-settings)). **Note:** The payment method will be blocked after 4 consecutive failed payments regardless. See the [billing settings](https://docs.rootplatform.com/docs/billing-settings#consecutive-failed-payments-allowed) guide for more details on the number of consecutive payments allowed. This field will be required if `status` is `failed`, forbidden otherwise.

        '
    collection-type:
      type: string
      description: The collection type of the payment being created.
      enum:
      - debit_order_same_day
      - debit_order_two_day
      - debit_order_one_day
      - debit_order_debicheck
      - card
      - external
      - collection_module
      - other
    claim:
      type: object
      required:
      - claim_id
      - created_at
      - claim_status
      - approval_status
      - created_by
      properties:
        claim_id:
          type: string
          description: Must be a UUID. The unique identifier of the claim.
        claim_number:
          type: string
          description: A human-readable claim reference number.
        created_at:
          type: string
          format: date-time
          description: The timestamp at which the claim was opened.
        updated_at:
          type: string
          format: date-time
          description: The timestamp at which the claim was last updated.
        policy_id:
          type:
          - string
          - 'null'
          description: Must be a UUID. The identifier of the [policy](ref:policy) attached to this claim. May be `null` if no policy is linked yet.
        policyholder_id:
          type:
          - string
          - 'null'
          description: Must be a UUID. The identifier of the [policyholder](ref:policyholder) for this claim. May be `null` if no policyholder is linked yet.
        member_id:
          type:
          - string
          - 'null'
          description: Must be a UUID. The identifier of the member for this claim. Only used for group scheme policies. May be `null`.
        covered_item_id:
          type:
          - string
          - 'null'
          description: Must be a UUID. The identifier of the covered item that this claim is against. Required if the policy supports covered items.
        claim_status:
          type: string
          description: The current status of the claim.
          enum:
          - open
          - in_review
          - acknowledged
          - pending_payout
          - paid_out
          - closed
        approval_status:
          type: string
          description: The approval decision status of the claim.
          enum:
          - pending
          - approved
          - repudiated
          - no_claim
          - goodwill
        claimant:
          type:
          - object
          - 'null'
          description: An object containing the claimant's details. `null` if no claimant is specified.
          properties:
            first_name:
              type: string
              description: The first name of the claimant.
            last_name:
              type: string
              description: The last name of the claimant.
            id_number:
              type: string
              description: The ID number of the claimant.
            cellphone:
              type: string
              description: The cellphone number of the claimant.
            email:
              type: string
              description: The email address of the claimant.
            relationship:
              type: string
              description: The relationship of the claimant to the policyholder.
        incident_type:
          type:
          - string
          - 'null'
          description: A description of the incident type.
        incident_cause:
          type:
          - string
          - 'null'
          description: A description of the cause of the incident.
        incident_date:
          type:
          - string
          - 'null'
          format: date-time
          description: The date on which the incident occurred.
        assigned_to:
          type:
          - string
          - 'null'
          description: Must be a UUID. The identifier of the user to whom this claim is assigned.
        app_data:
          type:
          - object
          - 'null'
          description: An object containing additional custom data for the claim.
          additionalProperties: true
        module_data:
          type:
          - object
          - 'null'
          description: An object containing data populated by the product module.
          additionalProperties: true
        requested_amount:
          type:
          - integer
          - 'null'
          description: The requested payout amount (in cents) for the claim.
        granted_amount:
          type:
          - integer
          - 'null'
          description: The granted payout amount (in cents) for the claim.
        rejection_reason:
          type:
          - string
          - 'null'
          description: The reason for claim rejection, if applicable.
        currency:
          type: string
          description: The currency code for monetary amounts (e.g., `ZAR`, `USD`).
        created_by:
          type:
          - object
          - 'null'
          description: An object indicating the user or API key that created the claim. See [Authentication](https://docs.rootplatform.com/reference/getting-started-1#created_by-field).
        policyholder:
