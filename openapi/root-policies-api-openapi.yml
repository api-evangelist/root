  /policies/{policy_id}/receipts:
    post:
      operationId: creating-policy-receipt
      summary: Create a policy receipt
      description: "Once a policy has been issued, it is important that a receipt is created which verifies that the new policyholder has received their actual policy. This receipt can either be in the form of a tracking pixel in an email which contains the policy document, or it could be a custom method (subject to approval).\n\nTo add a tracking pixel to a policy email, you create an `<img/>` tag which looks like the following:\n\n```html\n  <img src=\"https://sandbox.root.co.za/v1/insurance/policies/receipts/(:organisation_id).png?policy_id=128ba0c0-3f6a-4f8b-9b40-e2066b02b59e&version=1\" />\n```\n\nImportant to note is that the tag includes the policy version number and the policy unique identifier in the query string, while the image name that of your `organisation_id`.\n\nAlternatively if you wish to use a custom receipt method, you can `POST` to the receipt endpoint. This endpoint accepts any valid JSON object, but MUST include the version number in the body. The body value should be any data which could be reasonably said to be evidence of the policyholder receiving the policy document.\n"
      tags:
      - Policies
      x-additional-tags:
      - Create
      parameters:
      - name: policy_id
        in: path
        description: Must be a UUID. The unique identifier of the [policy](ref:policy).
        required: true
        schema:
          type: string
          example: 128ba0c0-3f6a-4f8b-9b40-e2066b02b59e
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - version
              - details
              properties:
                version:
                  type: integer
                  description: The version number of the policy in question.
                details:
                  type: object
                  description: Any additional data signifying the receipt of the policy document.
              example:
                version: 1
                details:
                  foo: bar
            example:
              version: 1
              details:
                foo: bar
      responses:
        '200':
          description: Success
