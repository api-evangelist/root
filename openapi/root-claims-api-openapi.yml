        schema:
          type: string
          example: d3d13c48-4dc3-4816-8d01-de3215878225
      requestBody:
        description: The blocks referenced in the request body must be defined in the [claims blocks schema](https://docs.rootplatform.com/docs/claims-blocks-reference) for the product module.
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required:
                - key
                - block_state
                properties:
                  key:
                    type: string
                    description: The unique identifier of the block in the claims blocks schema.
                  block_state:
                    type: object
                    description: The shape of the block state depends on the type of claims block. Read more [here](doc:claims-blocks-reference).
                    additionalProperties: true
              example:
              - key: free_text_block_nested_non_collapsible
                block_state:
                  type: input.text
                  value: Freetext
              - key: example_radio_block
                block_state:
                  type: radio
                  option_key: single
                  option_value: Single
              - key: example_date_block
                block_state:
                  type: input.date
                  value: '2023-03-10T08:51:17.000Z'
