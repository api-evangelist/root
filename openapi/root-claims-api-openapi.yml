                updated_at: '2022-02-15T10:00:00.000Z'
  /claims/{claim_id}/send-to-capture:
    post:
      operationId: send-to-capture
      summary: Send claim to capture
      description: Sends a claim to the capture stage for additional information gathering.
      tags:
      - Claims
      x-additional-tags:
      - Manage
      parameters:
      - name: claim_id
        in: path
        description: The unique identifier of the claim.
        required: true
        schema:
          type: string
          format: uuid
          example: bf1ada91-eecb-4f47-9bfa-1258bb1e0055
      - name: include
        in: query
        description: A comma-separated list of related resources to include in the response.
        required: false
        schema:
          type: array
          items:
            type: string
            enum:
            - policy
            - policyholder
            - user_group
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                assigned_to_user_id:
                  type: string
                  format: uuid
                  description: The unique identifier of the user to assign the claim to.
            example:
              assigned_to_user_id: 00000000-0000-0000-0000-000000000001
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/claim'
              example:
                claim_id: bf1ada91-eecb-4f47-9bfa-1258bb1e0055
                claim_number: CLM-000001
                claim_status: open
                approval_status: pending
                policy_id: 80f8e67a-15e5-417c-9d29-dfc31a5b92bb
                policyholder_id: 2800a20b-ce92-4463-a0de-75cd76d8bf22
                assigned_to: 00000000-0000-0000-0000-000000000001
                created_at: '2022-01-31T11:25:23.427Z'
                updated_at: '2022-01-31T12:00:00.000Z'
  /payout-requests/{payout_request_id}:
    patch:
      operationId: update-a-payout-request
      summary: Update a payout request
      tags:
      - Claims
      x-additional-tags:
      - Payout requests
      parameters:
      - name: payout_request_id
        in: path
        description: Must be a UUID. The unique identifier of the payout request.
        required: true
        schema:
          type: string
          example: 02f94351-94c8-40a4-ace1-97d7fe4b7a9a
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - status
              properties:
                status:
                  type: string
                  description: The status of the payout request. This must be one of [`pending`, `processing`, `completed`, `rejected`].
                reason:
                  type: string
                  description: A string describing why the payout request is being rejected. This is required when the status is `rejected`, and forbidden otherwise.
                proof_of_payment:
                  type: object
                  description: Object containing the proof of payment for a successfully completed payout request. This is optional when the status is `completed`, and forbidden otherwise.
                  properties:
                    file_name:
                      type: string
                      description: The name of the file (with file extension).
                    description:
                      type: string
                      description: A tag describing what the document is about (e.g. affidavit, etc.).
                    file_base64:
                      type: string
                      description: The raw file bytes encoded as a base 64 string. Limited to a maximum of 4 MB in size.
                    file_type:
                      type: string
                      description: The mime type of the attachment (e.g. image/png).
                  required:
                  - file_name
                  - description
                  - file_base64
                  - file_type
              example:
                status: rejected
                reason: Rejected as part of testing
            example:
              status: rejected
              reason: Rejected as part of testing
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  payout_request_id:
                    type: string
                  created_at:
                    type: string
                  created_by:
                    type: object
                  status:
                    type: string
                  rejection_reason:
                    type: string
                  type:
                    type: string
                  amount:
                    type: string
                  description:
                    type: string
                  finalized_at:
                    type: string
                  finalized_by:
                    type: object
                  claim_id:
                    type: string
                  policy_id:
                    type: string
                  policyholder_id:
                    type: string
                  payee:
                    type: object
              example:
                payout_request_id: 02f94351-94c8-40a4-ace1-97d7fe4b7a9a
                created_at: '2022-01-31T13:55:27.717Z'
                created_by:
                  type: user
                  id: 00000000-0000-0000-0000-000000000001
                status: rejected
                rejection_reason: Rejected as part of testing
                type: claim_payout
                amount: '2500000'
                description: 'Monetary payout to be actioned on approval of claim AAD65AF5CDC5 '
                finalized_at: '2022-01-31T13:56:16.208Z'
                finalized_by:
                  type: api_key
                  id: 420df14d-b09d-4d89-84a8-8e3118c9ca23
                  owner_id: 00000000-0000-0000-0000-000000000001
                claim_id: 63bdffce-2ffb-41f7-8c71-c85711ec4c2c
                policy_id: 39cf9f0a-2363-476e-a718-7c9b4a408e6a
                policyholder_id: 9c27fb39-bcc6-4ccf-a5f1-c6352cbc24f0
                payee:
                  beneficiary_id: 25348c7b-620d-41c3-803d-7daebc7599a1
                  policyholder_id: 9c27fb39-bcc6-4ccf-a5f1-c6352cbc24f0
                  percentage: 100
                  payment_details:
                    type: eft
                    details:
                      bank_name: ABSA
                      branch_code: '12345'
                      account_type: cheque_account
                      account_number: '123456789'
                  relationship: other
components:
  parameters:
    fulfillment_request_id:
      name: fulfillment_request_id
      in: path
      description: Must be a UUID. The unique identifier of the fulfillment request.
      required: true
      schema:
        type: string
        example: f84b3856-1358-4e12-bcf6-6732bc8b9522
    page:
      name: page
      in: query
      description: The page number of the entities to fetch. Must be a minimum of 1.
      required: false
      schema:
        type: integer
        minimum: 1
        example: 1
        default: 1
    page_size:
      name: page_size
      in: query
      description: The maximum number of items that will be contained in a single page, between 1 and 100 (inclusive).
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        example: 30
        default: 30
  schemas:
    claim:
      type: object
      required:
      - claim_id
      - created_at
      - claim_status
      - approval_status
      - created_by
      properties:
        claim_id:
          type: string
          description: Must be a UUID. The unique identifier of the claim.
        claim_number:
          type: string
          description: A human-readable claim reference number.
        created_at:
          type: string
          format: date-time
          description: The timestamp at which the claim was opened.
        updated_at:
          type: string
          format: date-time
          description: The timestamp at which the claim was last updated.
        policy_id:
          type:
          - string
          - 'null'
          description: Must be a UUID. The identifier of the [policy](ref:policy) attached to this claim. May be `null` if no policy is linked yet.
        policyholder_id:
          type:
          - string
          - 'null'
          description: Must be a UUID. The identifier of the [policyholder](ref:policyholder) for this claim. May be `null` if no policyholder is linked yet.
        member_id:
          type:
          - string
          - 'null'
          description: Must be a UUID. The identifier of the member for this claim. Only used for group scheme policies. May be `null`.
        covered_item_id:
          type:
          - string
          - 'null'
          description: Must be a UUID. The identifier of the covered item that this claim is against. Required if the policy supports covered items.
        claim_status:
          type: string
          description: The current status of the claim.
          enum:
          - open
          - in_review
          - acknowledged
          - pending_payout
          - paid_out
          - closed
        approval_status:
          type: string
          description: The approval decision status of the claim.
          enum:
          - pending
          - approved
          - repudiated
          - no_claim
          - goodwill
        claimant:
          type:
          - object
          - 'null'
          description: An object containing the claimant's details. `null` if no claimant is specified.
          properties:
            first_name:
              type: string
              description: The first name of the claimant.
            last_name:
              type: string
              description: The last name of the claimant.
            id_number:
              type: string
              description: The ID number of the claimant.
            cellphone:
              type: string
              description: The cellphone number of the claimant.
            email:
              type: string
              description: The email address of the claimant.
            relationship:
              type: string
              description: The relationship of the claimant to the policyholder.
        incident_type:
          type:
          - string
          - 'null'
          description: A description of the incident type.
        incident_cause:
          type:
          - string
          - 'null'
          description: A description of the cause of the incident.
        incident_date:
          type:
          - string
          - 'null'
          format: date-time
          description: The date on which the incident occurred.
        assigned_to:
          type:
          - string
          - 'null'
          description: Must be a UUID. The identifier of the user to whom this claim is assigned.
        app_data:
          type:
          - object
          - 'null'
          description: An object containing additional custom data for the claim.
          additionalProperties: true
        module_data:
          type:
          - object
          - 'null'
          description: An object containing data populated by the product module.
          additionalProperties: true
        requested_amount:
          type:
          - integer
          - 'null'
          description: The requested payout amount (in cents) for the claim.
        granted_amount:
          type:
          - integer
          - 'null'
          description: The granted payout amount (in cents) for the claim.
        rejection_reason:
          type:
          - string
          - 'null'
          description: The reason for claim rejection, if applicable.
        currency:
          type: string
          description: The currency code for monetary amounts (e.g., `ZAR`, `USD`).
        created_by:
          type:
          - object
          - 'null'
          description: An object indicating the user or API key that created the claim. See [Authentication](https://docs.rootplatform.com/reference/getting-started-1#created_by-field).
        policyholder:
          type:
          - object
          - 'null'
          description: The [policyholder](ref:policyholder) object. Only included when `include=policyholder` query parameter is specified.
        policy:
          type:
          - object
          - 'null'
          description: The [policy](ref:policy) object. Only included when `include=policy` query parameter is specified.
        member:
          type:
          - object
          - 'null'
          description: The member object for group scheme policies. Only included when available.
        user_group:
          type:
          - object
          - 'null'
          description: The user group object. Only included when `include=user_group` query parameter is specified.
        block_states:
          type:
          - object
          - 'null'
          description: An object containing the current state of claim blocks (dynamic form fields).
          additionalProperties: true
      example:
        claim_id: d3d13c48-4dc3-4816-8d01-de3215878225
        claim_number: D33B754ADA8F
        created_at: '2017-10-16T10:12:02.872Z'
        updated_at: '2017-10-16T10:15:02.872Z'
        policy_id: 8349345c-a6c5-4bf9-8ebb-6bbfc1628715
        policyholder_id: 00000000-0000-0000-0000-000000000004
        member_id: 673b8081-9668-4136-97cc-6ae0debda083
        covered_item_id: 9dc39b57-cdc7-48f9-a303-d7c4f0421a0c
        claim_status: open
        approval_status: pending
        claimant:
          first_name: Erlich
          last_name: Aviato
          email: erlich@aviato.com
          cellphone: 0821234567
          relationship: main_member
        incident_type: Theft
        incident_cause: Device stolen during burglary
        incident_date: '2017-10-15T08:00:00.000Z'
        app_data:
          key1: value 1
          key2: value 2
        requested_amount: 13000000
        granted_amount: null
        currency: ZAR
        created_by:
          id: 00000000-0000-0000-0000-000000000001
          type: user
    attachments:
      type: array
      items:
        $ref: '#/components/schemas/attachment'
    notes:
      type: array
      items:
        $ref: '#/components/schemas/note'
    claims:
      type: array
      items:
        $ref: '#/components/schemas/claim'
    note:
      type: object
      required:
      - text
      - created_at
      properties:
        text:
          type: string
          description: A string of text for the note.
        created_at:
          type: string
          format: date-time
          description: Time at which the attachment was created.
      example:
        text: Customer spoke to Erlich previously
        created_at: '2022-10-16T10:12:02.872Z'
        requested_by:
          type: user
          id: 00000000-0000-0000-0000-000000000001
    cellphone:
      type:
      - object
      - 'null'
      description: '`null` and `""` allowed. Object containing the cellphone number in national format, and the corresponding alpha 2 country code.'
      properties:
        number:
          type: string
          description: The cellphone number.
        country:
          type: string
          description: The [ISO Alpha-2](http://www.nationsonline.org/oneworld/country_code_list.htm) country code of the country of the cellphone number.
      required:
      - number
      - country
      example:
        number: 0821234567
        country: ZA
    attachment:
      type: object
      required:
      - file_name
      - description
      - file_type
      - file_url
      - created_at
      - requested_by
      properties:
        file_name:
          type: string
          description: The name of the file (with file extension).
        description:
          type: string
          description: A tag describing what the document is about (e.g. affidavit, etc.).
        file_type:
          type: string
          description: The mime type of the attachment (e.g. image/png).
        file_url:
          type: string
          format: uri
          description: The URL to download the attachment file.
        created_at:
          type: string
          format: date-time
          description: Time at which the attachment was created.
        requested_by:
          type: object
          description: An object indicating the user or API key that created the attachment. See [Authentication](#client-apps).
          properties:
            type:
              type: string
              description: The type of the creator (e.g., user, api_key).
            id:
              type: string
              description: The identifier of the creator.
            owner_id:
              type: string
              description: The identifier of the owner (only present for API key requests).
          required:
          - type
        type:
          type: string
          description: The event type associated with the attachment (e.g., attachment_created). This field is only present when the attachment is returned as part of an event.
      example:
        file_name: report.pdf
        file_type: application/pdf
        file_url: https://sandbox.rootplatform.com/v1/files/download/00000000-0000-0000-0000-000000000001
        description: quote
        type: attachment_created
        created_at: '2025-11-10T14:33:50.095Z'
        requested_by:
          type: api_key
          id: 00000000-0000-0000-0000-000000000001
          owner_id: 00000000-0000-0000-0000-000000000001
    fulfillment-request:
      type: object
      required:
      - fulfillment_request_id
      - fulfillment_type_id
      - policy_id
      - claim_id
      - status
      - fulfillment_data
      - created_at
      - created_by
      - environment
      properties:
        fulfillment_request_id:
          type: string
          description: Must be a UUID. The fulfillment request ID.
        fulfillment_type_id:
          type: string
          description: Must be a UUID. The fulfillment type ID.
        fulfillment_type:
          type: object
          description: The fulfillment type object containing type details.
          properties:
            fulfillment_type_id:
              type: string
              format: uuid
              description: The unique identifier of the fulfillment type.
            key:
              type: string
              description: The key identifier of the fulfillment type.
            name:
              type: string
              description: The name of the fulfillment type.
            description:
              type: string
              description: A description of the fulfillment type.
        policy_id:
          type: string
          description: Must be a UUID. The ID of the policy linked to the claim.
        claim_id:
          type: string
          description: Must be a UUID. The ID of the claim linked to the fulfillment request.
        status:
          type: string
          enum:
          - pending
          - rejected
          - successful
          description: A string indicating the status of the fulfillment request.
        fulfillment_data:
          type: object
          description: The fulfillment data as specified in the fulfillment type.
        created_at:
          type: string
          format: date-time
          description: The time at which the fulfillment request was created.
        created_by:
          type:
          - object
          - 'null'
          description: An object indicating the user or API key that created the fulfillment request. See [Authentication](https://docs.rootplatform.com/reference/getting-started-1#created_by-field).
        environment:
          type: string
          enum:
          - sandbox
          - production
          description: Whether the payout request was created in Root's sandbox or production environment.
        finalized_at:
          type: string
          format: date-time
          description: The time at which the fulfillment request was finalized.
        finalized_by:
          type: object
          description: An object indicating the user or API key that finalized the fulfillment request. See [Authentication](https://docs.rootplatform.com/reference/getting-started-1#created_by-field).
      example:
        fulfillment_request_id: 8f8b3469-82e9-4d5b-bcc5-f200af095a79
        fulfillment_type_id: ad044686-6b6f-4ce6-878f-143039243f11
        fulfillment_type:
          fulfillment_type_id: ad044686-6b6f-4ce6-878f-143039243f11
          key: repatriation
          name: Repatriation
          description: Cover for repatriation of remains
        policy_id: 2800a20b-ce92-4463-a0de-75cd76d8bf22
        claim_id: 80f8e67a-15e5-417c-9d29-dfc31a5b92bb
        status: pending
        fulfillment_data:
          amount: '100000'
          customer_account_number: 02870611321
        created_at: '2022-06-07T12:52:55.014Z'
        created_by:
          type: user
          id: 99ff4c56-577c-11e9-b47c-a3d0f3abd20c
        environment: sandbox
    cellphone-string:
      type:
      - string
      - 'null'
      description: '`null` and `""` allowed. String containing the cellphone number in international format.'
      example: '+27821234567'
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
